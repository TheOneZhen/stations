name: 3d-image-transition CI

on:
  pull_request:
    paths:
      - 'packages/3d-image-transition/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/3d-image-transition-ci.yml'
  push:
    branches:
      - master
    paths:
      - 'packages/3d-image-transition/**'
      - 'pnpm-lock.yaml'
      - '.github/workflows/3d-image-transition-ci.yml'

concurrency:
  group: 3d-image-transition-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-and-build:
    name: Test & build library
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter 3d-image-transition test

      - name: Build library
        run: pnpm --filter 3d-image-transition build:lib
