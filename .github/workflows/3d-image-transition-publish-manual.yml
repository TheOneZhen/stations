name: Publish 3d-image-transition (manual)

on:
  workflow_dispatch:
    inputs:
      dist_tag:
        description: 'npm dist-tag (latest, beta, next, ...)'
        required: false
        default: latest

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm --filter 3d-image-transition test

      - name: Build library
        run: pnpm --filter 3d-image-transition build:lib

      - name: Publish to npm
        working-directory: packages/3d-image-transition
        run: npm publish --provenance --access public --tag ${{ inputs.dist_tag }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
